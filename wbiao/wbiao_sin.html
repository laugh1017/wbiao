<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.min.js"></script>
    <link rel="stylesheet" href="./css/wbiao_login.css">
    <link rel="stylesheet" href="./css/wbiao_sin.css">
</head>
<body>
    <div class="werp">
        <div class="login_logo">
            <img src="./images/logo-icon.png" alt="">
            <img src="./images/slogan-0224.png" alt="">
        </div>
        <div class="sin_con">
            <h5>注册万表会员</h5>
            <div class="sin_box">
                <form action="http://localhost:8081/wbiao/php/wbiao_sin.php" method="post">
                    <ul class="content_box">
                        <li>
                            <em class="icon-a-phone-icon"></em>
                            <input type="text" placeholder="请输入手机号码" id="phone" maxlength="11" name="phone">
                            <p id="error1"></p>
                        </li>
                        <li>
                            <em class="icon-a-note-code"></em>
                             <input type="text" placeholder="请输入验证码" class="imgCaptchaWrap" id="num">
                             <img src="./images/captcha2.png" title="看不清？点击更换另一个验证码。" class="r_imgCaptcha">
                             <p id="error2"></p>
                        </li>
                        <li>
                            <em class="icon-a-note-code"></em>
                            <input type="text" placeholder="请输入短信验证码" class="imgCaptchaWrap"  id="num1">
                            <input type="button" title="点击获取验证码" value="获取验证码" class="r_imgCaptcha">
                            <p id="error5"></p>
                        </li>
                        <li>
                            <em class="icon-a-psd-icon"></em>
                            <input type="password" placeholder="请设置密码" id="password" name="password">
                            <span class="ico icon-d-eye-close"></span>
                            <p id="error3"></p>
                        </li>
                        <li>
                            <em class="icon-a-psd-icon"></em>
                            <input type="password" placeholder="请再次输入密码" id="password1">
                            <span class="ico icon-d-eye-close"></span>
                            <p id="error4"></p>
                        </li>
                    </ul>
                    <input type="submit" value="立即注册" class="register" id="sin">
                    <p class="condition">点击“立即注册”，即表示您同意并愿意遵守<a target="_blank" href="#">万表网用户协议</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="./js/wbiao_sin.js"></script>
</html>
