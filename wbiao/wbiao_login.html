<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.min.js"></script>
    <link rel="stylesheet" href="./css/wbiao_login.css">
    <link rel="stylesheet" href="./css/wbiao_sin.css">
</head>

<body>
    <div class="werp">
        <div class="login_logo">
            <img src="./images/logo-icon.png" alt="">
        </div>
    </div>
    <div class="login_bg">
        <div class="werp">
            <div class="login_box">
                <div class="login_tab">
                    <span class="on red">会员登录</span>
                    <em></em>
                    <span class="scan" >扫码登录</span>
                </div>
                <form action="http://localhost:8081/wbiao/php/wbiao_login.php" class="post" >
                    <ul class="content_box none">
                        <li>
                            <em class="icon-a-phone-icon"></em>
                            <input type="text" placeholder="请输入手机号码"  maxlength="11" name="phone">
                            <p id="error1"></p>
                        </li>
                        <li>
                            <em class="icon-a-note-code"></em>
                            <input type="text" placeholder="请输入验证码" class="imgCaptchaWrap" id="num">
                            <img src="./images/captcha2.png" title="看不清？点击更换另一个验证码。" class="r_imgCaptcha">
                            <p id="error2"></p>
                        </li>
                        <li>
                            <em class="icon-a-note-code"></em>
                            <input type="text" placeholder="请输入短信验证码" class="imgCaptchaWrap" id="num1">
                            <input type="button" title="点击获取验证码" value="获取验证码" class="r_imgCaptcha">
                            <p id="error5"></p>
                        </li>
                    </ul>
                    <ul class="content_box">
                        <li>
                            <em class="icon-a-phone-icon"></em>
                            <input type="text" placeholder="请输入手机号码" maxlength="11" name="phone" id="phone">
                            <p id="error1"></p>
                        </li>
                        <li>
                            <em class="icon-a-psd-icon"></em>
                            <input type="password" placeholder="请输入密码" id="password" name="password">
                            <span class="ico icon-d-eye-close"></span>
                            <p id="error3"></p>
                        </li>
                    </ul>
                    
                    <input type="submit" value="立即登录" class="register" >

                    <a href="./wbiao_sin.html">免费注册</a>
                    <a href="" class="rig">忘记密码</a>
                    <p class="pos">
                        <a href="javascript:void(0);" class="phone_dynamic a1 none">账号密码</a>
                        <a href="javascript:void(0);" class="phone_dynamic1 a2 ">手机动态码登录 </a>
                        <em class="a4">|</em>
                        <a href="javascript:void(0);" class="social_login a3 " data-phone="true">社交登录</a>
                    </p>
                </form>
                <div class="con_box1 none">
                    <div class="qr_code">
                        <img src="./images/qr .png" alt="">
                    </div>
                    <p>使用<span>万表APP</span>扫码登录<br><i>在首页顶部搜索栏点击扫一扫</i></p>
                    <a href="javascript:void(0);" id="downloadApp">下载万表APP</a>
                </div>
            </div>
        </div>
    </div>
    </div>

<script src="./js/wbiao_login.js"></script>
